name: orderly-cloud

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orderly}
      POSTGRES_USER: ${POSTGRES_USER:-orderly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - orderly-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  orderly-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: orderly-server:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      TZ: ${TZ:-Asia/Shanghai}
      ORDERLY_PUBLIC_URL: ${ORDERLY_PUBLIC_URL:?Set ORDERLY_PUBLIC_URL in .env}
      ORDERLY_POSTGRES_HOST: postgres
      ORDERLY_POSTGRES_PORT: 5432
      ORDERLY_POSTGRES_DB: ${POSTGRES_DB:-orderly}
      ORDERLY_POSTGRES_USER: ${POSTGRES_USER:-orderly}
      ORDERLY_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      ORDERLY_JWT_SIGNING_KEY: ${ORDERLY_JWT_SIGNING_KEY:?Set ORDERLY_JWT_SIGNING_KEY in .env}
      ORDERLY_BOOTSTRAP_ADMIN_TOKEN: ${ORDERLY_BOOTSTRAP_ADMIN_TOKEN:-}
      ORDERLY_ALLOWED_ORIGINS: ${ORDERLY_ALLOWED_ORIGINS:?Set ORDERLY_ALLOWED_ORIGINS in .env}
      ORDERLY_BACKUP_RETENTION_DAYS: ${ORDERLY_BACKUP_RETENTION_DAYS:-30}
      ORDERLY_REQUIRE_PRE_MIGRATION_BACKUP: ${ORDERLY_REQUIRE_PRE_MIGRATION_BACKUP:-true}
      ORDERLY_REQUIRE_PRE_IMPORT_BACKUP: ${ORDERLY_REQUIRE_PRE_IMPORT_BACKUP:-true}
      ORDERLY_LOCAL_BACKUP_DIR: /opt/orderly/backups
      ORDERLY_LOCAL_EXPORT_DIR: /opt/orderly/exports
      ORDERLY_EXPORT_RETENTION_HOURS: ${ORDERLY_EXPORT_RETENTION_HOURS:-24}
      ORDERLY_EXPORT_MAX_RETRY_COUNT: ${ORDERLY_EXPORT_MAX_RETRY_COUNT:-2}
      ORDERLY_EXPORT_MAX_LOCAL_BYTES: ${ORDERLY_EXPORT_MAX_LOCAL_BYTES:-2147483648}
      ORDERLY_OSS_ENDPOINT: ${ORDERLY_OSS_ENDPOINT:-}
      ORDERLY_OSS_BUCKET: ${ORDERLY_OSS_BUCKET:-}
      ORDERLY_OSS_ACCESS_KEY_ID: ${ORDERLY_OSS_ACCESS_KEY_ID:-}
      ORDERLY_OSS_ACCESS_KEY_SECRET: ${ORDERLY_OSS_ACCESS_KEY_SECRET:-}
      ORDERLY_OSS_BACKUP_PREFIX: ${ORDERLY_OSS_BACKUP_PREFIX:-backups/}
      ORDERLY_OSS_EXPORT_PREFIX: ${ORDERLY_OSS_EXPORT_PREFIX:-exports/}
    volumes:
      - orderly-backups:/opt/orderly/backups
      - orderly-exports:/opt/orderly/exports
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      orderly-server:
        condition: service_healthy
    environment:
      ORDERLY_DOMAIN: ${ORDERLY_DOMAIN:?Set ORDERLY_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - orderly-caddy-data:/data
      - orderly-caddy-config:/config

volumes:
  orderly-postgres-data:
  orderly-backups:
  orderly-exports:
  orderly-caddy-data:
  orderly-caddy-config:
