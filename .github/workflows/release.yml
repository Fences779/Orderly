name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  windows-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      RELEASE_REPO_URL: https://github.com/Fences779/Orderly

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "仅允许正式发布 tag：vX.Y.Z。当前：$tag"
          }
          $version = $tag -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore
        run: dotnet restore Orderly.sln

      - name: Build
        run: dotnet build Orderly.sln -c Release --no-restore

      - name: Test
        run: dotnet test Orderly.sln -c Release --no-build

      - name: Restore tools
        run: dotnet tool restore

      - name: Build Velopack release
        shell: pwsh
        run: |
          .\scripts\release\build-velopack-release.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -RepoUrl "${env:RELEASE_REPO_URL}" `
            -GithubToken "${{ github.token }}"

      - name: Clear existing release assets for rerun
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "Bearer ${{ github.token }}"
            Accept = "application/vnd.github+json"
            "User-Agent" = "GitHubActions"
          }
          try {
            $release = Invoke-RestMethod `
              -Headers $headers `
              -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          }
          catch {
            Write-Host "Release does not exist yet; upload will create it."
            return
          }

          $deleteNames = @(
            "Orderly-stable-Setup.exe",
            "Orderly-${{ steps.version.outputs.version }}-stable-full.nupkg",
            "Orderly-${{ steps.version.outputs.version }}-stable-delta.nupkg",
            "RELEASES-stable",
            "releases.stable.json",
            "assets.stable.json"
          )

          foreach ($asset in $release.assets) {
            if ($deleteNames -contains $asset.name) {
              Write-Host "Deleting existing release asset: $($asset.name)"
              Invoke-RestMethod `
                -Method Delete `
                -Headers $headers `
                -Uri "https://api.github.com/repos/${{ github.repository }}/releases/assets/$($asset.id)"
            }
          }

      - name: Publish GitHub Release
        shell: pwsh
        run: |
          dotnet tool run vpk -- upload github `
            --outputDir ".\artifacts\release\${{ steps.version.outputs.version }}\packages" `
            --channel stable `
            --repoUrl "${env:RELEASE_REPO_URL}" `
            --token "${{ github.token }}" `
            --publish true `
            --merge true `
            --releaseName "Orderly ${{ steps.version.outputs.version }}" `
            --tag "${{ github.ref_name }}" `
            --targetCommitish "${{ github.sha }}"

      - name: Upload release sidecar assets
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "Bearer ${{ github.token }}"
            Accept = "application/vnd.github+json"
            "User-Agent" = "GitHubActions"
          }
          $release = Invoke-RestMethod `
            -Headers $headers `
            -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}"
          $uploadBase = $release.upload_url -replace '\{\?name,label\}', ''
          $existingAssets = @{}
          foreach ($asset in $release.assets) {
            $existingAssets[$asset.name] = $asset.id
          }
          $files = @(
            @{ Name = "RELEASES-stable"; Path = ".\artifacts\release\${{ steps.version.outputs.version }}\packages\RELEASES-stable"; ContentType = "application/octet-stream" },
            @{ Name = "assets.stable.json"; Path = ".\artifacts\release\${{ steps.version.outputs.version }}\packages\assets.stable.json"; ContentType = "application/json" }
          )
          foreach ($file in $files) {
            if (-not (Test-Path -LiteralPath $file.Path)) {
              throw "Release sidecar asset not found: $($file.Path)"
            }
            if ($existingAssets.ContainsKey($file.Name)) {
              Invoke-RestMethod `
                -Method Delete `
                -Headers $headers `
                -Uri "https://api.github.com/repos/${{ github.repository }}/releases/assets/$($existingAssets[$file.Name])"
            }
            $builder = [System.UriBuilder]::new($uploadBase)
            $builder.Query = "name=$([System.Uri]::EscapeDataString($file.Name))"
            Invoke-RestMethod `
              -Method Post `
              -Headers $headers `
              -ContentType $file.ContentType `
              -InFile $file.Path `
              -Uri $builder.Uri.AbsoluteUri | Out-Null
          }
